<svg viewBox="0 0 1000 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Green gradient -->
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e7d32"></stop>
      <stop offset="100%" stop-color="#c6ff00"></stop>
    </linearGradient>

    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd54f"></stop>
      <stop offset="100%" stop-color="#ffb300"></stop>
    </linearGradient>
  </defs>

  <!-- ICON -->
  <rect x="20" y="40" width="140" height="140" rx="25" fill="url(#greenGrad)"></rect>
  <text x="90" y="130" text-anchor="middle" font-size="70" font-weight="700" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif">
    EZ
  </text>

  <!-- MAIN TEXT (BLACK NOW) -->
  <text x="190" y="115" font-size="58" font-weight="700" font-family="Segoe UI, Arial, sans-serif" fill="#000000">
    HOUSTON 
    <tspan fill="url(#goldGrad)">EZ</tspan> 
    FINANCE
  </text>

  <!-- TAGLINE -->
  <text x="190" y="160" font-size="30" font-family="Segoe UI, Arial, sans-serif" fill="#444444">
    Search Autos &amp; Homes
  </text>
</svg>
