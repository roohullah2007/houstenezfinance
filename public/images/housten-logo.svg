<svg width="600" height="120" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient for icon -->
  <defs>
    <linearGradient id="greenGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e7d32"></stop>
      <stop offset="100%" stop-color="#aeea00"></stop>
    </linearGradient>

    <linearGradient id="goldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd54f"></stop>
      <stop offset="100%" stop-color="#ffb300"></stop>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <rect x="10" y="20" rx="20" ry="20" width="120" height="120" fill="url(#greenGradient)"></rect>
  <text x="70" y="100" text-anchor="middle" font-size="60" fill="white" font-family="Arial" font-weight="bold">EZ</text>

  <!-- Text -->
  <text x="160" y="85" font-size="48" fill="white" font-family="Arial" font-weight="bold">
    HOUSTON 
    <tspan fill="url(#goldGradient)">EZ</tspan> 
    FINANCE
  </text>

  <!-- Tagline -->
  <text x="160" y="130" font-size="28" fill="white" font-family="Arial">
    Search Autos &amp; Homes
  </text>
</svg>
